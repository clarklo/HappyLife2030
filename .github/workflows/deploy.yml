name: Deploy Retirement Dashboard

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore retirement-dashboard.csproj --configfile NuGet.Config

      - name: Publish
        run: dotnet publish retirement-dashboard.csproj -c Release -o release --nologo

      - name: Patch base href for GitHub Pages
        shell: pwsh
        run: |
          $repo = "${{ github.event.repository.name }}"
          $indexPath = "release/wwwroot/index.html"
          (Get-Content $indexPath -Raw).Replace('<base href="/" />', "<base href='/$repo/' />") | Set-Content $indexPath
          Copy-Item "release/wwwroot/index.html" "release/wwwroot/404.html"
          New-Item -ItemType File -Path "release/wwwroot/.nojekyll" -Force | Out-Null

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
